<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multi-Camera Recorder with Ghost Frame</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #liveVideo, #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        #overlayCanvas {
            opacity: 0.5;
            display: none; 
            pointer-events: none;
        }

        .mirrored { transform: scaleX(-1); }

        .controls-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 1.2rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 10;
            transition: opacity 0.4s ease;
            width: 90%;
            max-width: 500px;
        }

        .button-group {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s, transform 0.1s;
        }

        button:active:not(:disabled) { transform: scale(0.95); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #startBtn { background-color: #4CAF50; color: white; }
        #pauseBtn { background-color: #FFC107; color: black; }
        #stopBtn { background-color: #F44336; color: white; }
        #downloadBtn { background-color: #2196F3; color: white; }
        #mirrorBtn { background-color: #ffffff; color: #000; }
        #switchCamBtn { background-color: #9C27B0; color: white; } /* Purple button */

        .status {
            font-size: 0.9rem;
            color: #ffffff;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="liveVideo" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        
        <div id="controlsOverlay" class="controls-overlay">
            <div class="status" id="statusText">Camera ready.</div>
            <div class="button-group">
                <button id="switchCamBtn">Switch Cam</button>
                <button id="mirrorBtn">Flip View</button>
                <button id="startBtn">Start</button>
                <button id="pauseBtn" disabled>Pause</button>
                <button id="stopBtn" disabled>Stop</button>
                <button id="downloadBtn" disabled>Download</button>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('liveVideo');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const ctx = overlayCanvas.getContext('2d');
        const controlsOverlay = document.getElementById('controlsOverlay');
        
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const mirrorBtn = document.getElementById('mirrorBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        const statusText = document.getElementById('statusText');

        let mediaRecorder;
        let recordedChunks = [];
        let stream;
        let finalVideoUrl = null;
        let hideTimeout;
        
        // Default to front-facing camera
        let currentFacingMode = "user"; 

        // --- Camera Initialization & Management ---
        function stopCurrentCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        }

        async function initCamera() {
            stopCurrentCamera(); // Stop old tracks before starting new ones
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        width: { ideal: 1920 }, 
                        height: { ideal: 1080 },
                        facingMode: currentFacingMode 
                    }, 
                    audio: true 
                });
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = () => {
                    overlayCanvas.width = videoElement.videoWidth;
                    overlayCanvas.height = videoElement.videoHeight;
                };

                // Auto-adjust mirror effect based on camera type
                if (currentFacingMode === "user") {
                    videoElement.classList.add('mirrored');
                    overlayCanvas.classList.add('mirrored');
                } else {
                    videoElement.classList.remove('mirrored');
                    overlayCanvas.classList.remove('mirrored');
                }

                statusText.innerText = `Camera ready (${currentFacingMode === 'user' ? 'Front' : 'Rear'}).`;
                statusText.style.color = "#ffffff";

            } catch (err) {
                console.error("Camera error: ", err);
                statusText.innerText = "Camera access denied or unavailable.";
                statusText.style.color = "#F44336";
            }
        }

        // --- Camera Switch Toggle ---
        switchCamBtn.addEventListener('click', () => {
            // Disable button briefly to prevent rapid clicking from crashing the camera
            switchCamBtn.disabled = true;
            statusText.innerText = "Switching cameras...";
            
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            initCamera().then(() => {
                switchCamBtn.disabled = false;
            });
        });

        // --- Auto-Hide Controls Logic ---
        function resetUIHideTimer() {
            controlsOverlay.style.opacity = '1';
            controlsOverlay.style.pointerEvents = 'auto';
            clearTimeout(hideTimeout);
            
            hideTimeout = setTimeout(() => {
                // Only hide if we are currently recording to allow users to interact with menus
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    controlsOverlay.style.opacity = '0';
                    controlsOverlay.style.pointerEvents = 'none';
                }
            }, 3000);
        }

        window.addEventListener('mousemove', resetUIHideTimer);
        window.addEventListener('touchstart', resetUIHideTimer);
        window.addEventListener('click', resetUIHideTimer);

        // --- Mirror Toggle Logic ---
        mirrorBtn.addEventListener('click', () => {
            videoElement.classList.toggle('mirrored');
            overlayCanvas.classList.toggle('mirrored');
        });

        // --- Recording Logic ---
        startBtn.addEventListener('click', () => {
            if (finalVideoUrl) {
                window.URL.revokeObjectURL(finalVideoUrl);
                finalVideoUrl = null;
            }
            recordedChunks = [];
            
            try {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm; codecs=vp9' });
            } catch (e) {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4' }); 
            }

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                finalVideoUrl = URL.createObjectURL(blob);
                
                downloadBtn.disabled = false;
                startBtn.disabled = false;
                switchCamBtn.disabled = false; // Re-enable camera switching
                startBtn.innerText = "Re-Record";
                statusText.innerText = "Recording stopped. Ready to download.";
                resetUIHideTimer(); // Force UI back on
            };

            mediaRecorder.start();

            startBtn.disabled = true;
            switchCamBtn.disabled = true; // Prevent switching while recording
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            downloadBtn.disabled = true;
            statusText.innerText = "Recording...";
            statusText.style.color = "#4CAF50";
            resetUIHideTimer();
        });

        pauseBtn.addEventListener('click', () => {
            if (mediaRecorder.state === 'recording') {
                ctx.drawImage(videoElement, 0, 0, overlayCanvas.width, overlayCanvas.height);
                overlayCanvas.style.display = 'block';
                mediaRecorder.pause();
                
                pauseBtn.innerText = "Resume";
                statusText.innerText = "Paused. Overlaying last frame.";
                statusText.style.color = "#FFC107";
                
            } else if (mediaRecorder.state === 'paused') {
                overlayCanvas.style.display = 'none';
                mediaRecorder.resume();
                
                pauseBtn.innerText = "Pause";
                statusText.innerText = "Recording...";
                statusText.style.color = "#4CAF50";
            }
            resetUIHideTimer();
        });

        stopBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            overlayCanvas.style.display = 'none';
            
            pauseBtn.disabled = true;
            pauseBtn.innerText = "Pause";
            stopBtn.disabled = true;
        });

        downloadBtn.addEventListener('click', () => {
            if (!finalVideoUrl) return;
            
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = finalVideoUrl;
            a.download = `recording-${Date.now()}.webm`; 
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            statusText.innerText = "Video downloaded!";
            statusText.style.color = "#2196F3";
        });

        // Start
        initCamera();
        resetUIHideTimer();
    </script>
</body>
</html>
