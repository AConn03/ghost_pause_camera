<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seamless Multi-Camera Recorder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100vw;
            height: 100vh;
            background-color: #000;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #liveVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.5;
            display: none; 
            pointer-events: none;
            z-index: 5;
        }

        #recordingCanvas {
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            z-index: -10; 
        }

        .mirrored { transform: scaleX(-1); }

        .controls-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 1.2rem;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            z-index: 10;
            transition: opacity 0.4s ease;
            width: 90%;
            max-width: 500px;
        }

        .button-group {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 10px 14px;
            font-size: 0.9rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s, transform 0.1s;
        }

        button:active:not(:disabled) { transform: scale(0.95); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        #startBtn { background-color: #4CAF50; color: white; }
        #pauseBtn { background-color: #FFC107; color: black; }
        #stopBtn { background-color: #F44336; color: white; }
        #downloadBtn { background-color: #2196F3; color: white; }
        #mirrorBtn { background-color: #ffffff; color: #000; }
        #switchCamBtn { background-color: #9C27B0; color: white; }

        .status {
            font-size: 0.9rem;
            color: #ffffff;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="liveVideo" autoplay playsinline muted></video>
        <canvas id="overlayCanvas"></canvas>
        <canvas id="recordingCanvas"></canvas>
        
        <div id="controlsOverlay" class="controls-overlay">
            <div class="status" id="statusText">Camera ready.</div>
            <div class="button-group">
                <button id="switchCamBtn">Switch Cam</button>
                <button id="mirrorBtn">Flip View</button>
                <button id="startBtn">Start</button>
                <button id="pauseBtn" disabled>Pause</button>
                <button id="stopBtn" disabled>Stop</button>
                <button id="downloadBtn" disabled>Save Video</button>
            </div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('liveVideo');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const oCtx = overlayCanvas.getContext('2d');
        const recordingCanvas = document.getElementById('recordingCanvas');
        const rCtx = recordingCanvas.getContext('2d', { willReadFrequently: true });
        
        const controlsOverlay = document.getElementById('controlsOverlay');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const mirrorBtn = document.getElementById('mirrorBtn');
        const switchCamBtn = document.getElementById('switchCamBtn');
        const statusText = document.getElementById('statusText');

        let mediaRecorder;
        let recordedChunks = [];
        let stream;
        let finalBlob = null; // Storing the actual Blob now
        let hideTimeout;
        let currentFacingMode = "user"; 
        let isLiveViewMirrored = false; 

        let audioCtx, audioDest, audioSource;
        let finalStream;

        function stopCurrentCamera() {
            if (stream) stream.getTracks().forEach(track => track.stop());
        }

        async function initCamera() {
            stopCurrentCamera();
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: currentFacingMode }, 
                    audio: true 
                });
                videoElement.srcObject = stream;

                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioDest = audioCtx.createMediaStreamDestination();
                }
                if (audioSource) audioSource.disconnect();
                audioSource = audioCtx.createMediaStreamSource(stream);
                audioSource.connect(audioDest);
                
                videoElement.onloadedmetadata = () => {
                    if (!mediaRecorder || mediaRecorder.state === 'inactive') {
                        recordingCanvas.width = videoElement.videoWidth;
                        recordingCanvas.height = videoElement.videoHeight;
                        overlayCanvas.width = videoElement.videoWidth;
                        overlayCanvas.height = videoElement.videoHeight;
                    }

                    if (!finalStream) {
                        const canvasStream = recordingCanvas.captureStream(30); 
                        finalStream = new MediaStream([
                            canvasStream.getVideoTracks()[0],
                            audioDest.stream.getAudioTracks()[0]
                        ]);
                    }

                    if (currentFacingMode === "user") {
                        isLiveViewMirrored = true;
                        videoElement.classList.add('mirrored');
                    } else {
                        isLiveViewMirrored = false;
                        videoElement.classList.remove('mirrored');
                    }

                    statusText.innerText = `Camera ready (${currentFacingMode === 'user' ? 'Front' : 'Rear'}).`;
                };
            } catch (err) {
                statusText.innerText = "Camera access denied.";
            }
        }

        function renderLoop() {
            if (videoElement.readyState === videoElement.HAVE_ENOUGH_DATA) {
                rCtx.fillStyle = 'black';
                rCtx.fillRect(0, 0, recordingCanvas.width, recordingCanvas.height);
                
                if (isLiveViewMirrored) {
                    rCtx.save();
                    rCtx.translate(recordingCanvas.width, 0);
                    rCtx.scale(-1, 1);
                    rCtx.drawImage(videoElement, 0, 0, recordingCanvas.width, recordingCanvas.height);
                    rCtx.restore();
                } else {
                    rCtx.drawImage(videoElement, 0, 0, recordingCanvas.width, recordingCanvas.height);
                }
            }
            requestAnimationFrame(renderLoop);
        }

        switchCamBtn.addEventListener('click', () => {
            switchCamBtn.disabled = true;
            statusText.innerText = "Switching cameras...";
            currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
            initCamera().then(() => { switchCamBtn.disabled = false; });
        });

        mirrorBtn.addEventListener('click', () => {
            isLiveViewMirrored = !isLiveViewMirrored;
            videoElement.classList.toggle('mirrored');
        });

        startBtn.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            finalBlob = null;
            recordedChunks = [];
            
            try {
                mediaRecorder = new MediaRecorder(finalStream, { mimeType: 'video/webm; codecs=vp9' });
            } catch (e) {
                // iOS Safari fallback
                mediaRecorder = new MediaRecorder(finalStream, { mimeType: 'video/mp4' }); 
            }

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                finalBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                
                downloadBtn.disabled = false;
                startBtn.disabled = false;
                startBtn.innerText = "Re-Record";
                statusText.innerText = "Ready to save!";
                resetUIHideTimer();
            };

            mediaRecorder.start();

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            stopBtn.disabled = false;
            downloadBtn.disabled = true;
            statusText.innerText = "Recording...";
            statusText.style.color = "#4CAF50";
            resetUIHideTimer();
        });

        pauseBtn.addEventListener('click', () => {
            if (mediaRecorder.state === 'recording') {
                if (isLiveViewMirrored) {
                    oCtx.save();
                    oCtx.translate(overlayCanvas.width, 0);
                    oCtx.scale(-1, 1);
                    oCtx.drawImage(videoElement, 0, 0, overlayCanvas.width, overlayCanvas.height);
                    oCtx.restore();
                } else {
                    oCtx.drawImage(videoElement, 0, 0, overlayCanvas.width, overlayCanvas.height);
                }
                
                overlayCanvas.style.display = 'block';
                mediaRecorder.pause();
                pauseBtn.innerText = "Resume";
                statusText.innerText = "Paused. Align your shot.";
                statusText.style.color = "#FFC107";
                
            } else if (mediaRecorder.state === 'paused') {
                overlayCanvas.style.display = 'none';
                mediaRecorder.resume();
                pauseBtn.innerText = "Pause";
                statusText.innerText = "Recording...";
                statusText.style.color = "#4CAF50";
            }
            resetUIHideTimer();
        });

        stopBtn.addEventListener('click', () => {
            mediaRecorder.stop();
            overlayCanvas.style.display = 'none';
            pauseBtn.disabled = true;
            pauseBtn.innerText = "Pause";
            stopBtn.disabled = true;
        });

        // --- NEW iOS FRIENDLY DOWNLOAD LOGIC ---
        downloadBtn.addEventListener('click', async () => {
            if (!finalBlob) return;
            
            // Determine the right extension so iOS recognizes it as a video
            const ext = finalBlob.type.includes('mp4') ? 'mp4' : 'webm';
            const filename = `recording-${Date.now()}.${ext}`;
            const file = new File([finalBlob], filename, { type: finalBlob.type });

            // Try to use the native iOS Share Sheet first
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'My Video',
                    });
                    statusText.innerText = "Shared successfully!";
                } catch (error) {
                    console.log('Share canceled or failed', error);
                }
            } else {
                // Fallback for desktop browsers
                const url = window.URL.createObjectURL(finalBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                statusText.innerText = "Video downloaded!";
            }
            statusText.style.color = "#2196F3";
        });

        function resetUIHideTimer() {
            controlsOverlay.style.opacity = '1';
            controlsOverlay.style.pointerEvents = 'auto';
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    controlsOverlay.style.opacity = '0';
                    controlsOverlay.style.pointerEvents = 'none';
                }
            }, 3000);
        }

        window.addEventListener('mousemove', resetUIHideTimer);
        window.addEventListener('touchstart', resetUIHideTimer);

        initCamera();
        requestAnimationFrame(renderLoop);
        resetUIHideTimer();
    </script>
</body>
</html>
